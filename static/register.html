<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMCTech - Регистрация</title>
    <link rel="stylesheet" href="../css/register.css" />
  </head>
  <body>
    <main class="auth-card">
      <div class="header">
        <div class="logo-icon">IM</div>
        <span class="logo-text">IMCTech</span>
      </div>

      <h1>Создать аккаунт</h1>
      <p class="subtitle">Присоединяйтесь к проектной доске ДВФУ</p>

      <button class="social-btn">
        <span class="icon-yandex">Я</span>
        Войти через Яндекс
      </button>

      <button class="social-btn">
        <svg
          class="icon-github"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
          />
        </svg>
        Войти через GitHub
      </button>

      <div class="divider">или по email</div>

      <form class="auth-form">
        <input
          name="name"
          type="text"
          placeholder="Имя пользователя"
          class="input-field"
          required
          autocomplete="username"
        />
        <input
          name="email"
          type="email"
          placeholder="Email"
          class="input-field"
          required
          autocomplete="email"
        />
        <input
          name="password"
          type="password"
          placeholder="Пароль"
          class="input-field"
          required
          autocomplete="new-password"
        />
        <input
          name="confirmPassword"
          type="password"
          placeholder="Подтвердите пароль"
          class="input-field"
          required
          autocomplete="new-password"
        />
        <button type="submit" class="btn-primary">Зарегистрироваться</button>
      </form>

      <p class="auth-footer">
        Уже есть аккаунт? <a href="login.html" class="auth-link">Войти</a>
      </p>
    </main>
    <script type="module" src="/static/js/auth.js"></script>
  </body>
</html>
