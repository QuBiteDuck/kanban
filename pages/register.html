<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMCTech - Регистрация</title>
    <style>
        :root {
            --bg-overlay: #0b0e14;
            --bg-card: #151921;
            --bg-input: #0d1117;
            --border-color: #2a303c;
            --border-hover: #3b4252;
            --text-primary: #ffffff;
            --text-secondary: #8a919e;
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --yandex-red: #fc3f1d;
            --font-main: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --transition: 0.2s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-overlay);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Карточка авторизации */
        .auth-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* Шапка с логотипом */
        .header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background-color: var(--accent-blue);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        /* Заголовки */
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.3;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: -0.5rem;
        }

        /* Социальные кнопки */
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.75rem;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 0.95rem;
            cursor: pointer;
            transition: background-color var(--transition), border-color var(--transition);
        }

        .social-btn:hover {
            background-color: rgba(255, 255, 255, 0.04);
            border-color: var(--border-hover);
        }

        .icon-yandex {
            width: 20px;
            height: 20px;
            background-color: var(--yandex-red);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .icon-github {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Разделитель */
        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: lowercase;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: var(--border-color);
        }

        /* Форма */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .input-field {
            width: 100%;
            padding: 0.75rem 0.9rem;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .input-field::placeholder {
            color: #4b5563;
        }

        .input-field:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        /* Основная кнопка */
        .btn-primary {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--accent-blue);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color var(--transition), transform var(--transition);
            margin-top: 0.25rem;
        }

        .btn-primary:hover {
            background-color: var(--accent-blue-hover);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        /* Футер */
        .auth-footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .auth-link {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        /* Адаптив для маленьких экранов */
        @media (max-width: 480px) {
            .auth-card {
                padding: 1.5rem;
            }
            h1 {
                font-size: 1.35rem;
            }
        }
    </style>
</head>
<body>

    <main class="auth-card">
        <div class="header">
            <div class="logo-icon">IM</div>
            <span class="logo-text">IMCTech</span>
        </div>

        <h1>Создать аккаунт</h1>
        <p class="subtitle">Присоединяйтесь к проектной доске ДВФУ</p>

        <button class="social-btn">
            <span class="icon-yandex">Я</span>
            Войти через Яндекс
        </button>

        <button class="social-btn">
            <svg class="icon-github" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
            </svg>
            Войти через GitHub
        </button>

        <div class="divider">или по email</div>

        <form class="auth-form" onsubmit="event.preventDefault(); alert('Регистрация отправлена!');">
            <input type="text" placeholder="Имя пользователя" class="input-field" required autocomplete="username">
            <input type="email" placeholder="Email" class="input-field" required autocomplete="email">
            <input type="password" placeholder="Пароль" class="input-field" required autocomplete="new-password">
            <input type="password" placeholder="Подтвердите пароль" class="input-field" required autocomplete="new-password">
            <button type="submit" class="btn-primary">Зарегистрироваться</button>
        </form>

        <p class="auth-footer">Уже есть аккаунт? <a href="#" class="auth-link">Войти</a></p>
    </main>

</body>
</html>
