<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMCTech - Добро пожаловать</title>
    <link rel="stylesheet" href="../css/welcome.css" />
  </head>
  <body>
    <main class="welcome-wrapper">
      <div class="welcome-header">
        <div class="header-icon">
          <!-- Иконка канбан-доски -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="4" width="4" height="16" rx="1" />
            <rect x="10" y="4" width="4" height="10" rx="1" />
            <rect x="16" y="4" width="4" height="13" rx="1" />
          </svg>
        </div>
        <h1>Добро пожаловать</h1>
        <p>
          У вас пока нет ни одной доски. Создайте первый проект, чтобы начать
          работу.
        </p>
      </div>

      <form
        class="create-card"
        onsubmit="
          event.preventDefault();
          alert('Доска создана!');
        "
      >
        <div class="form-group">
          <label class="form-label" for="board-name">Название доски</label>
          <input
            type="text"
            id="board-name"
            class="form-input"
            placeholder="Например: IMCTech Kanban"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="board-desc">Описание</label>
          <textarea
            id="board-desc"
            class="form-textarea"
            placeholder="Краткое описание проекта..."
          ></textarea>
          <span class="optional-text">Необязательно</span>
        </div>

        <div class="info-box">
          <svg
            class="info-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="16" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
          <p class="info-text">
            Вы автоматически станете администратором доски. После создания вы
            сможете пригласить участников и назначить им роли.
          </p>
        </div>

        <button type="submit" class="btn-primary">
          <span class="btn-icon">+</span>
          Создать доску
        </button>
      </form>
    </main>

    <script type="module" src="../js/app.js"></script>
  </body>
</html>
